<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chest X-Ray - Project 2</title>
    <link rel="stylesheet" href="/cxray/static/styles.css" />
    <link rel="stylesheet" href="/cxray/static/nouislider.min.css" />
    <script src="/cxray/static/socket.io.min.js"></script>
    <script src="/cxray/static/nouislider.min.js"></script>
</head>
<body>
    <div class="container">

        <header><h1>Chest X-ray Preprocessing Explorer</h1></header>

        <div class="controls">

            <div class="control-row">
                <div class="control-group"><label for="config-file">Configuration</label><select id="config-file" onchange="loadSelectedConfig()"><option value="">Loading...</option></select></div>
                <div class="control-group"><label for="dataset">Dataset</label><select id="dataset" onchange="loadImages()"><option value="train">TRAIN</option><option value="test">TEST</option></select></div>
                <div class="control-group"><label for="class-filter">Class Filter</label><select id="class-filter" onchange="loadImagesPage()"><option value="all">All</option><option value="NORMAL">NORMAL</option><option value="PNEUMONIA">PNEUMONIA</option></select></div>
                <div class="control-group"><label for="dimension">Dimension</label><select id="dimension" onchange="onDimensionChange()"></select></div>

                <div class="control-group"><label for="h_crop">H-Crop (pixels)</label><input type="number" id="h_crop" min="0" step="1" value="0" onchange="loadImagesPage()"></div>
                <div class="control-group"><label for="v_crop">V-Crop (pixels)</label><input type="number" id="v_crop" min="0" step="1" value="0" onchange="loadImagesPage()"></div>
                <div class="control-group"><label for="clahe">CLAHE (clip limit)</label><input type="number" id="clahe" min="0" max="10" step="0.1" value="0" onchange="loadImagesPage()"></div>
                <div class="control-group"><label for="zoom_in">Zoom In (factor)</label><input type="number" id="zoom_in" min="0" max="2" step="0.05" value="0" onchange="loadImagesPage()"></div>
                <div class="control-group"><label>&nbsp;</label><button class="success" onclick="saveToConfig()">Save</button></div>
            </div>

            <div class="control-row">
                <div id="du-slider-panel" class="du-slider-panel"></div>
            </div>

        </div>

        <div class="info-box" id="info-box" style="display:none;">

            <label id="dimension-info" style="margin-top: 8px;"></label>

            <div class="pagination-controls">
                <button onclick="previousPage()" id="prev-btn" disabled>◀ &nbsp;Previous</button>
                <span>Page <input type="number" id="page-input" min="1" value="1" style="width: 65px; text-align: right; height: 33px;" onchange="goToPage()"> of <span id="total-pages">1</span></span>
                <button onclick="nextPage()" id="next-btn" disabled>Next&nbsp; ▶</button>
            </div>

        </div>

        <div class="image-grid-container">
            <div class="image-grid" id="image-grid"></div>
        </div>

        <div id="loading" class="loading" style="display:none;">Loading images...</div>
        <div class="status" id="status"></div>

    </div>

    <div id="du-tooltip" class="du-tooltip" style="display:none;"></div>    

    <script type="text/javascript" src="/cxray/static/app.js"></script>

</body>
</html>
